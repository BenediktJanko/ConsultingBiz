<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Škibi Bedny</title>

    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Tlačítko zpět */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #222;
            border: 2px solid #555;
            border-radius: 50%;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .back-btn:hover {
            background: #333;
            transform: scale(1.1);
        }

        /* Logo nahoře */
        .logo-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .logo {
            height: 65px;
            width: auto;
            object-fit: contain;
        }

        h1 {
            margin-top: 80px;
            margin-bottom: 30px;
        }

        /* Kontejner pro ruletu */
        .roulette-wrapper {
            position: relative;
            width: 800px;
            height: 160px;
            background: #111;
            border: 2px solid #444;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Červená ryska */
        .selector {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4444;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Pás se skiny */
        #roll-strip {
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            will-change: transform;
        }

        /* Skin */
        .item {
            min-width: 150px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
            background: linear-gradient(180deg, #333 0%, #222 100%);
            font-size: 12px;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
        }

        .item img {
            width: 100px;
            height: auto;
            margin-bottom: 10px;
        }

        /* Rarity */
        .mil-spec { border-bottom: 5px solid #4b69ff; }
        .restricted { border-bottom: 5px solid #8847ff; }
        .classified { border-bottom: 5px solid #d32ee6; }
        .covert { border-bottom: 5px solid #eb4b4b; }
        .gold { border-bottom: 5px solid #caab05; }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            background: #5cb85c;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background: #4cae4c;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <!-- Tlačítko zpět -->
    <a href="index.html" class="back-btn">←</a>

    <!-- Logo -->
                <div class="col-xl-2 col-lg-2">
              <div class="logo">
                <a href="index.html" aria-label="ConsultingBiz Home"><img src="assets/img/logo/škibilogo (2).webp"
                                                                            alt="ConsultingBiz" width="150" height="30"
                                                                            fetchpriority="high" decoding="sync"></a>
              </div>
            </div>


    <h1>Otevři svou bednu</h1>

    <div class="roulette-wrapper">
        <div class="selector"></div>

        <div id="roll-strip">
            <!-- Generuje JS -->
        </div>
    </div>

    <button id="spin-btn" onclick="spin()">Otevřít (Spin)</button>

    <script>
        const strip = document.getElementById('roll-strip');
        const btn = document.getElementById('spin-btn');

        // Skiny
        const skins = [
            { name: "AK-47 Slate", rarity: "mil-spec" },
            { name: "M4A4 Griffin", rarity: "restricted" },
            { name: "AWP Neo-Noir", rarity: "classified" },
            { name: "AK-47 Bloodsport", rarity: "covert" },
            { name: "Butterfly Knife", rarity: "gold" }
        ];

        const itemWidth = 150;
        const visibleItems = 50;

        // Inicializace pásu
        function initStrip() {

            strip.innerHTML = '';
            strip.style.transition = 'none';
            strip.style.transform = 'translateX(0px)';

            for (let i = 0; i < visibleItems; i++) {

                const skin = skins[Math.floor(Math.random() * skins.length)];

                const div = document.createElement('div');

                div.className = `item ${skin.rarity}`;

                div.innerHTML = `
                    <div style="
                        width:80px;
                        height:60px;
                        background:#444;
                        margin-bottom:10px;
                        border-radius:4px;
                    "></div>

                    <span>${skin.name}</span>
                `;

                strip.appendChild(div);
            }
        }

        // Spin
        function spin() {

            btn.disabled = true;

            initStrip();

            // Vynucení překreslení
            strip.offsetHeight;

            // Výherní pozice
            const winningIndex = 45;

            // Animace
            strip.style.transition =
                'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';

            // Náhodný offset
            const randomOffset =
                Math.floor(Math.random() * (itemWidth - 10)) + 5;

            // Výpočet pozice
            const targetPos =
                (winningIndex * itemWidth) - 400 + randomOffset;

            // Posun
            strip.style.transform =
                `translateX(-${targetPos}px)`;

            // Konec animace
            setTimeout(() => {

                const winner =
                    strip.children[winningIndex].innerText;

                alert("Padlo ti: " + winner);

                btn.disabled = false;

            }, 5000);
        }

        // Start
        initStrip();
    </script>

</body>
</html>
